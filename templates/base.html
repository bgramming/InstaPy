<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DeliveryOpt{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div class="d-flex" id="wrapper">
  <nav id="sidebar" class="bg-dark text-white d-flex flex-column p-0">
    <div class="sidebar-brand d-flex align-items-center px-3 py-3">
      <i class="bi bi-truck fs-4 me-2 text-warning"></i>
      <span class="fw-bold fs-5">DeliveryOpt</span>
    </div>
    <ul class="nav flex-column flex-grow-1 px-2 pb-3">
      <li class="nav-item">
        <a href="/" class="nav-link text-white-50 {% if request.path == '/' %}active text-white{% endif %}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="/routes" class="nav-link text-white-50 {% if request.path.startswith('/routes') %}active text-white{% endif %}">
          <i class="bi bi-map me-2"></i>Routes
        </a>
      </li>
      <li class="nav-item">
        <a href="/drivers" class="nav-link text-white-50 {% if request.path == '/drivers' %}active text-white{% endif %}">
          <i class="bi bi-person-badge me-2"></i>Drivers
        </a>
      </li>
    </ul>
    <div class="px-3 pb-3 text-white-50 small">
      <i class="bi bi-circle-fill text-success me-1" style="font-size:.5rem"></i>Connected
    </div>
  </nav>

  <!-- Page content -->
  <div id="page-content" class="flex-grow-1 d-flex flex-column">
    <!-- Top bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4 py-2">
      <button class="btn btn-sm btn-outline-secondary me-3" id="sidebarToggle">
        <i class="bi bi-list"></i>
      </button>
      <span class="navbar-text fw-semibold text-dark">{% block page_title %}{% endblock %}</span>
      <div class="ms-auto d-flex gap-2">
        {% block topbar_actions %}{% endblock %}
      </div>
    </nav>

    <!-- Flash messages -->
    <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index:9999"></div>

    <!-- Main content -->
    <main class="flex-grow-1 p-4 bg-light overflow-auto">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
