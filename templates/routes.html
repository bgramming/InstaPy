{% extends "base.html" %}
{% block title %}Routes — DeliveryOpt{% endblock %}
{% block page_title %}Routes{% endblock %}

{% block topbar_actions %}
<button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#newRouteModal">
  <i class="bi bi-plus-lg me-1"></i>New Route
</button>
{% endblock %}

{% block content %}
<!-- Filter bar -->
<div class="d-flex gap-2 mb-3">
  <button class="btn btn-sm btn-outline-secondary active" data-filter="">All</button>
  <button class="btn btn-sm btn-outline-secondary" data-filter="pending">Pending</button>
  <button class="btn btn-sm btn-outline-secondary" data-filter="active">Active</button>
  <button class="btn btn-sm btn-outline-secondary" data-filter="completed">Completed</button>
</div>

<!-- Routes list -->
<div id="routes-container">
  <div class="text-center text-muted py-5">
    <div class="spinner-border text-warning" role="status"></div>
  </div>
</div>

<!-- New Route Modal -->
<div class="modal fade" id="newRouteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">New Route</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="newRouteForm">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-medium">Route Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="name" placeholder="e.g. Monday Morning Run" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">Assign Driver</label>
            <select class="form-select" name="driver_id" id="driverSelect">
              <option value="">— Unassigned —</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">Notes</label>
            <textarea class="form-control" name="notes" rows="2" placeholder="Optional notes…"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-warning">Create Route</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Route card template -->
<template id="routeCardTemplate">
  <div class="card border-0 shadow-sm mb-3 route-card">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h6 class="mb-1 route-name fw-semibold"></h6>
          <div class="text-muted small route-meta"></div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="badge route-status-badge"></span>
          <a class="btn btn-sm btn-outline-primary route-open-btn">Open</a>
          <button class="btn btn-sm btn-outline-danger route-delete-btn">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
      <div class="mt-2 d-flex gap-3 small text-muted">
        <span><i class="bi bi-geo-alt me-1"></i><span class="route-stops">0</span> stops</span>
        <span><i class="bi bi-rulers me-1"></i><span class="route-dist">—</span></span>
        <span class="route-optimized-badge"></span>
      </div>
    </div>
  </div>
</template>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/routes.js') }}"></script>
{% endblock %}
